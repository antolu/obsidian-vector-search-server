name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'

env:
  STORE_PATH: ''

jobs:
  build:
    name: Build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Get release version
        id: version
        run: |
          TAG=${GITHUB_REF/refs\/tags\//}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Package plugin
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p obsidian-vector-search-server
          cp dist/main.js obsidian-vector-search-server/
          cp dist/manifest.json obsidian-vector-search-server/
          zip -r "obsidian-vector-search-server-${VERSION}.zip" obsidian-vector-search-server/

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          gh release create "v${VERSION}" \
            --title="v${VERSION}" \
            --draft \
            "obsidian-vector-search-server-${VERSION}.zip"
