name: Release Obsidian plugin

on:
  push:
    tags:
      - 'v*'

env:
  STORE_PATH: ''

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: Validate tag message for major/minor releases
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "Tag: $TAG_NAME"

          # Treat any tag containing '-dev' as a dev release (no message required)
          if [[ "${TAG_NAME,,}" == *-dev* ]]; then
            echo "Detected dev release (contains -dev); skipping message requirement."
            exit 0
          fi

          # Strip leading 'v' for semver parsing
          VER_STRIPPED="${TAG_NAME#v}"

          if [[ "$VER_STRIPPED" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR=${BASH_REMATCH[1]}
            MINOR=${BASH_REMATCH[2]}
            PATCH=${BASH_REMATCH[3]}
            echo "Parsed semver: major=$MAJOR minor=$MINOR patch=$PATCH"
          else
            echo "Tag '$TAG_NAME' does not match semver x.y.z or x.y.z-devN patterns; skipping message check."
            exit 0
          fi

          # If this is a patch release (PATCH > 0) then no message required
          if [ "$PATCH" -gt 0 ]; then
            echo "Patch release (patch=$PATCH); skipping message requirement."
            exit 0
          fi

          # From here: PATCH == 0 and not a dev release -> require annotated tag with a non-empty message
          echo "Major/minor release detected (patch=0). Verifying annotated tag and non-empty message..."

          if ! objtype=$(git cat-file -t "refs/tags/$TAG_NAME" 2>/dev/null || true); then
            objtype=""
          fi

          if [ "$objtype" != "tag" ]; then
            echo "Tag '$TAG_NAME' is not an annotated tag (object type: ${objtype:-none})." >&2
            echo "Create an annotated tag with a message, e.g. git tag -a $TAG_NAME -m 'Release notes...' && git push origin $TAG_NAME" >&2
            exit 1
          fi

          TAG_MSG=$(git for-each-ref --format='%(contents)' "refs/tags/$TAG_NAME" || true)
          TAG_MSG_TRIMMED=$(echo "$TAG_MSG" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

          if [ -z "$TAG_MSG_TRIMMED" ]; then
            echo "Annotated tag '$TAG_NAME' has an empty message." >&2
            echo "Please create the tag with a release message, e.g. git tag -a $TAG_NAME -m 'Release notes...' && git push origin $TAG_NAME" >&2
            exit 1
          fi

          echo "Annotated tag message present. Continuing."

      - name: Extract tag into VERSION
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Generate build-time version (optional)
        run: |
          mkdir -p src/generated
          cat > src/generated/version.ts <<'EOF'
          // generated by CI
          export const VERSION = '${{ steps.version.outputs.VERSION }}'
          EOF
        shell: bash

      - name: Install deps
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Package plugin
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p obsidian-vector-search-server
          cp dist/main.js obsidian-vector-search-server/
          cp dist/manifest.json obsidian-vector-search-server/ || true
          zip -r "obsidian-vector-search-server-${VERSION}.zip" obsidian-vector-search-server/

      - name: Generate changelog for release body
        id: gen_changelog
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG_NAME}$" | head -n1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..$TAG_NAME"
          else
            RANGE="$TAG_NAME"
          fi
          echo "Generating changelog for range: $RANGE"
          CHANGELOG=$(git --no-pager log --pretty=format:'- %s (%h)' "$RANGE" || true)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No notable changes"
          fi
          RELEASE_BODY="Automated build for $TAG_NAME\n\n$CHANGELOG"
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          printf '%s\n' "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

      # REST create_release step removed: softprops action will create/update the release

      - name: Verify artifact exists
        run: |
          F=obsidian-vector-search-server-${{ steps.version.outputs.VERSION }}.zip
          echo "Checking for $F"
          ls -la "$F"

      - name: Create GitHub Release and upload zip (softprops)
        uses: softprops/action-gh-release@v3
        with:
          files: obsidian-vector-search-server-${{ steps.version.outputs.VERSION }}.zip
          name: ${{ github.ref_name }}
          body: ${{ steps.gen_changelog.outputs.release_notes }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
